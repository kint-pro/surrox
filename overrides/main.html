{% extends "base.html" %}

{% block extrahead %}
  {% if page %}
  <meta property="og:type" content="website" />
  <meta property="og:title" content="{{ page.title }} - {{ config.site_name }}" />
  <meta property="og:description" content="{{ page.meta.description | default(config.site_description) }}" />
  <meta property="og:url" content="{{ page.canonical_url }}" />
  <meta property="og:site_name" content="{{ config.site_name }}" />
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="{{ page.title }} - {{ config.site_name }}" />
  <meta name="twitter:description" content="{{ page.meta.description | default(config.site_description) }}" />
    {% if page.meta and page.meta.schema_type == "SoftwareApplication" %}
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "SoftwareApplication",
    "name": "surrox",
    "applicationCategory": "DeveloperApplication",
    "operatingSystem": "Cross-platform",
    "url": "https://surrox-docs.pages.dev/",
    "description": "{{ config.site_description }}",
    "programmingLanguage": "Python",
    "softwareRequirements": "Python 3.13",
    "license": "https://opensource.org/licenses/MIT",
    "codeRepository": "https://github.com/kint-pro/surrox",
    "author": {
      "@type": "Organization",
      "name": "kint",
      "url": "https://github.com/kint-pro"
    },
    "offers": {
      "@type": "Offer",
      "price": "0",
      "priceCurrency": "USD"
    }
  }
  </script>
    {% endif %}
  {% endif %}
{% endblock %}
